<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地月 · 四级时空冒险</title>


<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0a0f;font-family:serif;color:#e0dcd0;overflow-x:hidden}
:root{--bg:#0a0a0f;--surface:#14141e;--surface2:#1c1c2a;--text:#e0dcd0;--text2:#908a78;--accent:#bb86fc}
#load{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .6s}
#load.hide{opacity:0;pointer-events:none}
.load-ring{width:48px;height:48px;border:3px solid #2a2a3e;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Title screen */
#title{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative}
#title h1{font-size:clamp(2rem,6vw,4rem);font-family:serif;margin-bottom:16px;letter-spacing:4px}
#title .sub{font-size:clamp(.9rem,2vw,1.1rem);color:var(--text2);margin-bottom:40px;line-height:1.6}
#title .start-btn{background:var(--surface2);border:2px solid var(--accent);border-radius:16px;padding:16px 48px;font-size:1.2rem;color:var(--text);cursor:pointer;font-family:serif;transition:all .4s;letter-spacing:3px}
#title .start-btn:hover{background:rgba(187,134,252,.15);box-shadow:0 0 30px rgba(187,134,252,.2);transform:translateY(-3px)}
#title .version{position:absolute;bottom:24px;font-size:.7rem;color:var(--text2);opacity:.3}

/* Chapter select */
#chapter-select{display:none;min-height:100vh;padding:40px 20px}
#chapter-select.active{display:block}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;max-width:960px;margin:40px auto 0}
.chapter-card{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;cursor:pointer;transition:all .4s;position:relative;overflow:hidden}
.chapter-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15)}
.chapter-card.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
.chapter-card.locked:hover{transform:none}
.chapter-card .day-tag{font-size:.7rem;font-family:monospace;color:var(--text2);margin-bottom:6px}
.chapter-card .ch-icon{font-size:1.8rem;margin-bottom:8px}
.chapter-card h3{font-size:1rem;margin-bottom:4px}
.chapter-card p{font-size:.8rem;color:var(--text2);line-height:1.4}
.chapter-card .status-badge{position:absolute;top:12px;right:12px;font-size:.7rem;padding:2px 10px;border-radius:10px}
.chapter-card .status-badge.done{background:rgba(0,255,65,.15);color:#7affa0}
.chapter-card .status-badge.lock{background:rgba(255,255,255,.05);color:var(--text2)}
.section-title{text-align:center;font-size:1.4rem;margin-top:20px}
.section-title small{display:block;font-size:.8rem;color:var(--text2);font-weight:400;margin-top:6px}

/* Game screen */
#game{display:none;min-height:100vh;padding:0}
#game.active{display:block}

/* Day header */
.day-header{background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.day-header .back{background:none;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer;padding:4px 8px;font-family:inherit}
.day-header .back:hover{color:var(--text)}
.day-header .d-title{flex:1;font-size:.95rem}
.day-header .d-title small{display:block;font-size:.7rem;color:var(--text2);font-weight:400}
.day-header .d-hp{font-size:.8rem;font-family:monospace;color:#7affa0;display:flex;align-items:center;gap:6px}
.day-header .d-hp.danger{color:#ff6666}
.day-header .d-stars{color:var(--accent);font-size:.85rem;font-family:monospace}

/* Story area */
.story-area{max-width:720px;margin:0 auto;padding:32px 20px 100px}
.story-passage{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px;margin-bottom:24px;line-height:2}
.story-passage .passage-title{font-size:1.2rem;font-weight:700;margin-bottom:16px}
.story-passage .passage-text{font-size:.92rem;color:var(--text);line-height:2.2}
.story-passage .passage-text em{color:var(--accent);font-style:normal;border-bottom:2px solid var(--accent);padding:0 2px;cursor:help;position:relative}
.story-passage .passage-text em:hover::after{content:attr(data-def);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;font-size:.75rem;white-space:nowrap;color:var(--text);z-index:5}
.vocab-highlight{color:var(--accent);border-bottom:2px solid var(--accent);cursor:help;position:relative}
.vocab-highlight:hover::after{content:attr(data-def);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;font-size:.75rem;white-space:nowrap;color:var(--text);z-index:5}

/* Narrative choice */
.choice-box{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:24px}
.choice-box .q{font-size:.95rem;margin-bottom:16px;line-height:1.6}
.choice-btn{display:block;width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;margin-bottom:8px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.85rem;text-align:left;transition:all .3s}
.choice-btn:hover{background:var(--bg);border-color:var(--accent);transform:translateX(4px)}
.choice-btn.selected{background:rgba(187,134,252,.12);border-color:var(--accent)}
.choice-btn.good{background:rgba(0,255,65,.1);border-color:#7affa0}
.choice-btn.bad{background:rgba(255,107,107,.1);border-color:#ff6666}

/* Vocab challenge */
.challenge-box{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px;margin-bottom:24px;text-align:center}
.challenge-box .cw{font-size:2rem;font-weight:700;margin-bottom:4px;letter-spacing:2px}
.challenge-box .cp{font-size:.75rem;color:var(--text2);margin-bottom:20px;font-family:monospace}
.challenge-box .ch-desc{font-size:.85rem;color:var(--text2);margin-bottom:20px;line-height:1.5}
.challenge-opt{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:0 auto}
.challenge-opt button{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 12px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .3s;text-align:center;line-height:1.4;min-height:60px}
.challenge-opt button:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.challenge-opt button.correct{background:rgba(0,255,65,.12);border-color:#7affa0}
.challenge-opt button.wrong{background:rgba(255,107,107,.1);border-color:#ff6666}
.challenge-feedback{margin-top:16px;font-size:.9rem;min-height:2em}
.challenge-next{margin-top:16px;display:none;background:var(--surface2);border:1px solid var(--accent);border-radius:10px;padding:10px 28px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .3s}
.challenge-next:hover{background:rgba(187,134,252,.12)}
.challenge-progress{font-size:.7rem;color:var(--text2);margin-bottom:12px;font-family:monospace}

/* Boss battle */
.boss-area{max-width:720px;margin:0 auto;padding:32px 20px 100px;text-align:center}
.boss-sprite{font-size:5rem;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.boss-name{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.boss-sub{font-size:.8rem;color:var(--text2);margin-bottom:16px}
.boss-hp-bar{max-width:400px;margin:0 auto 8px;height:8px;background:rgba(255,0,0,.15);border-radius:4px;overflow:hidden}
.boss-hp-bar .fill{height:100%;background:linear-gradient(90deg,#c62828,#ff4444);border-radius:4px;transition:width .5s}
.boss-hp-text{font-size:.75rem;color:var(--text2);font-family:monospace;margin-bottom:24px}
.player-hp-bar{max-width:400px;margin:16px auto 8px;height:6px;background:rgba(0,255,65,.1);border-radius:3px;overflow:hidden}
.player-hp-bar .fill{height:100%;background:linear-gradient(90deg,#4caf50,#7affa0);border-radius:3px;transition:width .4s}
.player-hp-text{font-size:.7rem;color:var(--text2);font-family:monospace;margin-bottom:20px}
.boss-log{font-size:.85rem;color:var(--text2);margin-bottom:20px;min-height:2em;line-height:1.6}
.boss-attack{font-size:1.1rem;margin-bottom:16px;min-height:1.5em}
.boss-attack .ba-word{font-size:1.6rem;font-weight:700;display:block;margin-bottom:4px}
.boss-attack .ba-ctx{font-size:.82rem;color:var(--text2);line-height:1.5;max-width:500px;margin:0 auto}
.boss-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;margin:0 auto}
.boss-options button{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 12px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .3s;min-height:60px;text-align:center;line-height:1.4}
.boss-options button:hover{border-color:var(--accent);transform:translateY(-2px)}
.boss-options button.correct{background:rgba(0,255,65,.12);border-color:#7affa0}
.boss-options button.wrong{background:rgba(255,107,107,.1);border-color:#ff6666}
.boss-victory{font-size:1.5rem;padding:40px 20px;line-height:2}
.boss-victory .big{font-size:2.5rem;display:block;margin-bottom:12px}

/* Day complete */
.day-complete{text-align:center;padding:60px 20px}
.day-complete .big-icon{font-size:4rem;margin-bottom:16px}
.day-complete h2{font-size:1.5rem;margin-bottom:8px}
.day-complete p{color:var(--text2);margin-bottom:24px;line-height:1.6}
.day-complete .stats{display:flex;gap:24px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.day-complete .stats span{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 20px;font-size:.85rem}
.day-complete .next-btn{background:var(--surface2);border:2px solid var(--accent);border-radius:12px;padding:12px 36px;font-size:1rem;color:var(--text);cursor:pointer;font-family:inherit;transition:all .4s}
.day-complete .next-btn:hover{background:rgba(187,134,252,.12);box-shadow:0 0 20px rgba(187,134,252,.15)}

/* Inventory / Loot after boss */
.loot-box{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.loot-item{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;text-align:center;min-width:100px}
.loot-item .li-icon{font-size:1.8rem;margin-bottom:4px}
.loot-item .li-name{font-size:.7rem;color:var(--text2)}

/* Epilogue (Day 8) special */
.epilogue{max-width:680px;margin:0 auto;padding:40px 20px;text-align:center}
.epilogue .epi-icon{font-size:3rem;margin-bottom:16px}
.epilogue .epi-title{font-size:1.5rem;margin-bottom:24px}
.epilogue .epi-text{font-size:.92rem;line-height:2.2;color:var(--text);text-align:left;margin-bottom:24px}

@media(max-width:600px){
  .chapter-grid{grid-template-columns:1fr}
  .challenge-opt,.boss-options{grid-template-columns:1fr}
  .story-passage{padding:20px}
  .day-header{padding:12px 16px}
}
</style>
</head>
<body>

<div id="load"><div class="load-ring"></div><div style="font-size:.8rem;color:var(--text2);letter-spacing:2px;">加载冒险...</div></div>

<!-- Title -->
<section id="title">
  <h1>🌌 时空迷途</h1>
  <div class="sub">
    一段跨越六个世界的四级词汇冒险<br>
    八天 · 八章 · 命运由你的选择书写
  </div>
  <button class="start-btn" onclick="startGame()">✦ 开始冒险 ✦</button>
  <div class="version">v1.0 · 地月专属</div>
</section>

<!-- Chapter select -->
<section id="chapter-select">
  <div class="section-title">🗺️ 时空地图 <small>选择章节开始冒险</small></div>
  <div class="chapter-grid" id="chapterGrid"></div>
</section>

<!-- Game -->
<section id="game">
  <div class="day-header" id="dayHeader">
    <button class="back" onclick="exitGame()">←</button>
    <div class="d-title" id="dayTitle">第 X 章 <small id="daySubtitle">章节名</small></div>
    <div class="d-hp" id="playerHP">❤️ 100</div>
    <div class="d-stars" id="dStars">⭐ 0</div>
  </div>
  <div id="gameContent"></div>
</section>

<script>
/* ─── SAVE ─── */
const SK = 'cet4_rpg_save';
function loadSave(){
  try{return JSON.parse(localStorage.getItem(SK))||{day:1,hp:100,stars:0,completed:[],bossesDefeated:[]}}catch(e){return {day:1,hp:100,stars:0,completed:[],bossesDefeated:[]}}
}
function saveSave(s){localStorage.setItem(SK,JSON.stringify(s))}

/* ─── CHAPTER DATA ─── */
const CHAPTERS = [
  {id:'df',day:1,icon:'🗡️',title:'暗影森林の献祭',domain:'darkfantasy',desc:'血月之下，古老的诅咒正在苏醒。你必须穿越被黑暗笼罩的森林，找到祭坛，打破轮回。',themeColor:'#c62828'},
  {id:'fgo',day:2,icon:'⚔️',title:'迦勒底の召唤',domain:'fgo',desc:'人理烧却的危机中，你被选为临时御主。召唤从者，穿越特异点，守护人类的历史。',themeColor:'#d4a017'},
  {id:'dev',day:3,icon:'🖥️',title:'数字迷宫の守护进程',domain:'devops',desc:'一个由代码构成的数字世界正在崩溃。修复网络，杀死守护进程，找到系统的出口。',themeColor:'#00ff41'},
  {id:'mys',day:4,icon:'🔮',title:'星辰塔罗の预言',domain:'mystic',desc:'古老的占星塔中，塔罗牌揭示了你此行的真正目的。星辰的轨迹，由你亲手续写。',themeColor:'#bb86fc'},
  {id:'gl',day:5,icon:'💕',title:'樱花树下の告白',domain:'galgame',desc:'春日的校园，樱花飞舞。一封没有署名的信，一段埋藏多年的心事。风中有秘密在低语。',themeColor:'#ff6b9d'},
  {id:'bio',day:6,icon:'🧬',title:'基因实验室の危机',domain:'biolab',desc:'废弃的实验室中，试管里的细胞正在异常分裂。找到变异源头，阻止一场生物灾难。',themeColor:'#4caf50'},
  {id:'final',day:7,icon:'🌑',title:'混沌之核',domain:'all',desc:'碎片聚合，时空之门打开。六界的黑暗融合为混沌之主——这是最后的战斗。',themeColor:'#ff4444'},
  {id:'end',day:8,icon:'🌅',title:'归途',domain:'none',desc:'旅程的终点。晨光中，你回头望向走过的路——所有的词汇，都成了你故事的一部分。',themeColor:'#ffd54f'}
];

/* ─── STORY CONTENT ─── */
const STORIES = {};

// Day 1: Dark Fantasy
STORIES.df = {
  icon:'🗡️', bg:'Dark Fantasy',
  intro: {
    text:'你睁开眼睛。头顶是一轮暗红色的月亮，月光穿过层层叠叠的枝叶，在你身上投下斑驳的暗影。空气中弥漫着潮湿的泥土味和一股若有若无的铁锈味。你撑着地面坐起来，手指触到了什么黏稠的东西——\n\n是血。',
    choices: [
      {text:'检查血迹的来源',result:'你沿着血迹的轨迹看去——一具尸体靠在不远处的树干上，胸前有一道深深的伤口。你的手指不自觉地摸向腰间，那里挂着一把匕首。'},
      {text:'大声呼救',result:'你的声音在森林中回荡，然后被寂静吞噬。远处传来一阵低沉的嚎叫——你决定保持安静，开始探索周围的环境。'}
    ]
  },
  reading: {
    title:'第一章 · 血月森林',
    text:'古老的森林笼罩在永夜的诅咒之中。每一棵树的树干上都刻着古老的${ritual}符文，微弱的红光在刻痕中流动。你知道，唯有在血月到达天顶之前完成祭坛的${sacrifice}，这片土地的${decay}才会停止。但有什么东西在暗处潜伏——你感到一阵深入骨髓的${dread}，仿佛被某种不可名状的存在注视着。你握紧了手中的${blade}，刃面映出一张苍白而坚定的脸。'
  },
  vocab: [
    {w:'ritual',p:'n.',d:'献祭仪式',e:'The cult performed a blood ritual beneath the crimson moon.'},
    {w:'sacrifice',p:'n./v.',d:'活祭；献祭',e:'The priest demanded a sacrifice to awaken the ancient demon.'},
    {w:'decay',p:'n./v.',d:'腐朽；衰败',e:'The castle smelled of decay—wet stone, rotting wood.'},
    {w:'dread',p:'n./v.',d:'恐惧；畏惧',e:'A cold dread settled in his chest, heavier than any blade.'},
    {w:'blade',p:'n.',d:'利刃',e:'A cursed blade leaves wounds that never heal.'}
  ],
  challenges:[
    {q:'前方出现一个暗影生物，它问你："你脚下的符文意味着什么？"',word:'ritual',answers:['献祭仪式','腐朽','恐惧','利刃'],correct:0,explain:'Ritual是"献祭仪式"——你脚下的符文正是仪式的一部分。'},
    {q:'受伤的旅人抓住你的手腕，低语道："把这场——结束掉。"',word:'decay',answers:['终结','腐朽','诅咒','暗影'],correct:1,explain:'Decay是"腐朽"——大地在诅咒中腐烂，你需要终结这一切。'},
    {q:'向祭坛献上祭品，你需要一个词来表达这个动作：',word:'sacrifice',answers:['祭祀','战利品','礼物','祈求'],correct:0,explain:'Sacrifice正是"献祭/祭祀"的意思。祭坛需要你付出代价。'}
  ],
  boss:{
    name:'暗影守卫 · Shade Warden',
    icon:'👹', hp:50,
    attacks:[
      {word:'shadow',ctx:'暗影守卫低吼："你驱散不了我的——我是这片森林的化身。"',options:['光','暗影','恐惧','符文'],answer:1},
      {word:'curse',ctx:'它的声音变成了千万人的低语："血月之——从未解除。"',options:['诅咒','祝福','献祭','契约'],answer:0},
      {word:'hollow',ctx:'它的胸口裂开，里面空无一物："看看你的内心——难道不是一样的——？"',options:['黑暗','寒冷','空洞','孤独'],answer:2}
    ]
  },
  outro:'祭坛的光芒吞噬了暗影守卫。血月终于落下，第一缕苍白的晨光穿过树梢。你低头看着自己的手掌——那里有一个发光的符文，像是一把钥匙的印记。\n\n第一个世界的大门关闭了，但你知道，这只是开始。'
};

// Day 2: FGO
STORIES.fgo = {
  icon:'⚔️', bg:'Fate/Grand Order',
  intro: {
    text:'光芒吞没你的瞬间，耳边响起了警报声。\n\n"灵子转移成功！Master，你还好吗？"——一个女性的声音从通讯器中传来，焦急而清晰。你低头看向自己的手背，那里有三道发光的刻印。\n\n你被召唤了。这里是迦勒底，而你，是最后的Master。',
    choices: [
      {text:'确认现状——询问当前特异点信息',result:'"这里是第七特异点——巴比伦尼亚。人理烧却的危机已经蔓延到这里。"通讯器的另一端顿了顿，"你需要找到并修复这个时代的圣杯。我们会全程支援你。"'},
      {text:'尝试使用令咒——测试力量',result:'手背上的令咒微微发热。你感觉到一股力量沿着手臂流淌——这是你与从者之间的契约之证。通讯器中传来赞许的声音："明智的选择。从现在开始，你的判断就是我们的判断。"'}
    ]
  },

      {word:'home',ctx:'"你一直在寻找的——，其实一直都在你心里。"',options:['家','答案','终点','归途'],answer:0}
    ]
  },
  outro:'混沌之核在你的最后一句回答中瓦解。六道光芒从碎片中升起，在你周围形成了一个温暖的光茧。\n\n一个声音——像所有你帮助过的人的声音叠加在一起——轻轻说：\n\n"你学会的不只是词汇。你学会了如何理解不同的世界。而这，就是四级的真正意义。"\n\n裂缝开始闭合。你知道，是时候回家了。'
};

// Day 8: Epilogue
STORIES.end = {
  icon:'🌅', bg:'Epilogue',
  intro: null,
  reading: null,
  vocab:[],
  challenges:[],
  boss:null,
  epilogue:true,
  text:'你从床上醒来。\n\n晨光透过窗帘的缝隙洒进来，落在你的枕边。手机屏幕亮着，上面是四级考试的倒计时——还有最后一天。\n\n你几乎要以为那只是一场梦。但你的书桌上放着一些不属于你的东西：一块暗影森林的符文石、一枚迦勒底的徽章、塔罗师的愚者牌、一片压干的樱花瓣……\n\n你笑了。\n\n你翻开四级词汇书。那些词你全都认识——不是因为背过，而是因为你经历过。\n\nRitual、Sacrifice、Dread、Blade、Summon、Daemon、Config、Arcana、Celestial、Classmate、Campus、Love、Cell、Nucleus、Gene、Enzyme、Courage、Journey、Light、Home……\n\n每一个词都是一段故事。每一个词都是你走过的路。\n\n你合上书，看向窗外。天空很蓝。\n\n四级不是终点。它是通往更多世界的门票。而你已经准备好了。',
  outro:null
};

/* ─── GAME STATE ─── */
let state = null;

function startGame(){
  document.getElementById('title').style.display='none';
  document.getElementById('chapter-select').classList.add('active');
  renderChapters();
}

function renderChapters(){
  const grid = document.getElementById('chapterGrid');
  const save = loadSave();
  grid.innerHTML = '';
  CHAPTERS.forEach((ch,i)=>{
    const card = document.createElement('div');
    const unlocked = i === 0 || save.completed.includes(CHAPTERS[i-1].id);
    const done = save.completed.includes(ch.id) || (ch.id==='end' && save.completed.includes('final'));
    card.className = `chapter-card${unlocked?'':' locked'}`;
    card.innerHTML = `
      <div class="day-tag">DAY ${ch.day}</div>
      <div class="ch-icon">${unlocked?ch.icon:'🔒'}</div>
      <h3>${unlocked?ch.title:'???'}</h3>
      <p>${unlocked?ch.desc:'完成前一章以解锁'}</p>
      ${done?'<div class="status-badge done">✓ 已完成</div>':!unlocked?'<div class="status-badge lock">🔒 未解锁</div>':''}
    `;
    if(unlocked && !done) card.onclick = ()=>playDay(ch.id);
    grid.appendChild(card);
  });
}

function playDay(dayId){
  state = {dayId,phase:'intro',hp:loadSave().hp,stars:loadSave().stars,challengeIdx:0,bossHp:0,bossMax:0};
  document.getElementById('chapter-select').classList.remove('active');
  document.getElementById('game').classList.add('active');
  renderDay();
}

function exitGame(){
  document.getElementById('game').classList.remove('active');
  document.getElementById('chapter-select').classList.add('active');
  state = null;
  renderChapters();
}

function renderDay(){
  const story = STORIES[state.dayId];
  const ch = CHAPTERS.find(c=>c.id===state.dayId);
  if(!story) return;

  // Update header
  document.getElementById('dayTitle').innerHTML = `第 ${ch.day} 章 <small>${story.icon} ${ch.title}</small>`;
  document.getElementById('playerHP').textContent = '❤️ '+state.hp;
  document.getElementById('dStars').textContent = '⭐ '+state.stars;

  const content = document.getElementById('gameContent');

  // If epilogue (Day 8)
  if(story.epilogue){
    content.innerHTML = `
      <div class="epilogue">
        <div class="epi-icon">🌅</div>
        <div class="epi-title">第八章 · 归途</div>
        <div class="epi-text">${story.text.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</div>
      </div>
      <div class="day-complete">
        <div class="stats">
          <span>❤️ ${state.hp} HP</span>
          <span>⭐ ${state.stars} 星辰</span>
          <span>📚 8/8 天完成</span>
        </div>
        <div style="font-size:2rem;margin-bottom:16px">🎉</div>
        <p style="color:var(--text2)">你完成了所有八天的冒险！<br>每一个词都是一段旅程。继续前进吧。</p>
        <button class="next-btn" onclick="exitGame()">✦ 回到时空地图</button>
      </div>`;
    updateSave();
    return;
  }

  if(state.phase === 'intro'){
    content.innerHTML = `
      <div class="story-area">
        <div class="story-passage">
          <div class="passage-title">序章 · ${ch.title}</div>
          <div class="passage-text">${story.intro.text.replace(/\n/g,'<br>')}</div>
        </div>
        <div class="choice-box">
          <div class="q">你如何行动？</div>
          ${story.intro.choices.map((c,i)=>`<button class="choice-btn" onclick="introChoice(${i})">${c.text}</button>`).join('')}
        </div>
      </div>`;
    return;
  }

  if(state.phase === 'reading'){
    const rd = story.reading;
    if(!rd){startChallenges();return;}
    // Build passage text with vocab highlights
    let txt = rd.text;
    // Replace ${word} with highlighted span
    const words = story.vocab;
    words.forEach(w=>{
      txt = txt.replace('${'+w.w+'}', `<span class="vocab-highlight" data-def="${w.d} (${w.w})">${w.w}</span>`);
    });
    content.innerHTML = `
      <div class="story-area">
        <div class="story-passage">
          <div class="passage-title">📖 ${rd.title}</div>
          <div class="passage-text">${txt.replace(/\n/g,'<br>')}</div>
        </div>
        <div class="challenge-box" style="text-align:left">
          <div style="font-size:.85rem;color:var(--text2);margin-bottom:12px">📚 本章词汇 · 悬停高亮词查看释义</div>
          ${words.map(w=>`<span style="display:inline-block;background:var(--surface2);border-radius:6px;padding:4px 10px;margin:3px;font-size:.8rem"><strong>${w.w}</strong> <span style="color:var(--text2)">${w.p}</span></span>`).join('')}
        </div>
        <button class="choice-btn" onclick="startChallenges()" style="border-color:var(--accent);text-align:center;margin-top:16px">📝 开始词汇挑战 →</button>
      </div>`;
    return;
  }

  if(state.phase === 'challenge'){
    const chs = story.challenges;
    if(!chs || state.challengeIdx >= chs.length){startBoss();return;}
    const c = chs[state.challengeIdx];
    content.innerHTML = `
      <div class="story-area">
        <div class="challenge-box">
          <div class="challenge-progress">词汇挑战 ${state.challengeIdx+1}/${chs.length}</div>
          <div class="cw">${c.word}</div>
          <div class="cp">? · 选择正确释义</div>
          <div class="ch-desc">${c.q}</div>
          <div class="challenge-opt" id="chOpts">
            ${c.answers.map((a,i)=>`<button onclick="answerChallenge(${i})">${a}</button>`).join('')}
          </div>
          <div class="challenge-feedback" id="chFeedback"></div>
          <button class="challenge-next" id="chNext" onclick="nextChallenge()">下一题 →</button>
        </div>
      </div>`;
    return;
  }

  if(state.phase === 'boss'){
    const b = story.boss;
    if(!b){finishDay();return;}
    if(state.bossHp === 0){state.bossHp = b.hp; state.bossMax = b.hp;}
    if(state.bossHp <= 0){finishDay();return;}
    const atkIdx = state.bossAtkIdx || 0;
    const atk = b.attacks[atkIdx];
    if(!atk){finishDay();return;}
    const hpPct = Math.round(state.bossHp/state.bossMax*100);
    const phpPct = Math.max(0,Math.round(state.hp/100*100));
    content.innerHTML = `
      <div class="boss-area">
        <div class="boss-sprite">${b.icon}</div>
        <div class="boss-name">${b.name}</div>
        <div class="boss-sub">HP ${state.bossHp}/${state.bossMax}</div>
        <div class="boss-hp-bar"><div class="fill" style="width:${hpPct}%"></div></div>
        <div class="player-hp-text">❤️ ${state.hp}</div>
        <div class="player-hp-bar"><div class="fill" style="width:${phpPct}%"></div></div>
        <div class="boss-log" id="bossLog">${state.bossLog||'BOSS 发动了攻击！'}</div>
        <div class="boss-attack">
          <span class="ba-word">${atk.word}</span>
          <span class="ba-ctx">"${atk.ctx}"</span>
        </div>
        <div class="boss-options" id="bossOpts">
          ${atk.options.map((o,i)=>`<button onclick="answerBoss(${i})">${o}</button>`).join('')}
        </div>
        <div class="player-hp-bar" style="max-width:500px"><div class="fill" style="width:${phpPct}%;height:8px"></div></div>
      </div>`;
    return;
  }
}

/* ─── GAME LOGIC ─── */
function introChoice(idx){
  const story = STORIES[state.dayId];
  const result = story.intro.choices[idx].result;
  const content = document.getElementById('gameContent');
  content.innerHTML = `
    <div class="story-area">
      <div class="story-passage">
        <div class="passage-text">${result.replace(/\n/g,'<br>')}</div>
      </div>
      <button class="choice-btn" onclick="startReading()" style="border-color:var(--accent);text-align:center">📖 继续阅读 →</button>
    </div>`;
}

function startReading(){
  state.phase = 'reading';
  renderDay();
}

function startChallenges(){
  const story = STORIES[state.dayId];
  if(!story.challenges || story.challenges.length===0){
    if(story.boss) startBoss();
    else finishDay();
    return;
  }
  state.phase = 'challenge';
  state.challengeIdx = 0;
  renderDay();
}

function answerChallenge(idx){
  const story = STORIES[state.dayId];
  const c = story.challenges[state.challengeIdx];
  const btns = document.querySelectorAll('#chOpts button');
  btns.forEach(b=>b.onclick=null);
  if(idx === c.correct){
    btns[idx].classList.add('correct');
    state.stars += 2;
    document.getElementById('chFeedback').innerHTML = `✅ 正确！${c.explain}`;
    document.getElementById('chFeedback').style.color = '#7affa0';
  } else {
    btns[idx].classList.add('wrong');
    btns[c.correct].classList.add('correct');
    state.hp = Math.max(1, state.hp - 5);
    document.getElementById('chFeedback').innerHTML = `❌ 不对哦～正确答案是：${c.answers[c.correct]}`;
    document.getElementById('chFeedback').style.color = '#ff6666';
  }
  document.getElementById('chNext').style.display = 'inline-block';
  document.getElementById('dStars').textContent = '⭐ '+state.stars;
  document.getElementById('playerHP').textContent = '❤️ '+state.hp;
}

function nextChallenge(){
  const story = STORIES[state.dayId];
  state.challengeIdx++;
  if(state.challengeIdx >= story.challenges.length){
    if(story.boss) startBoss();
    else finishDay();
    return;
  }
  renderDay();
}

function startBoss(){
  state.phase = 'boss';
  const story = STORIES[state.dayId];
  if(story.boss){
    state.bossHp = story.boss.hp;
    state.bossMax = story.boss.hp;
    state.bossAtkIdx = 0;
    state.bossLog = '';
  }
  renderDay();
}

function answerBoss(idx){
  const story = STORIES[state.dayId];
  const b = story.boss;
  const atk = b.attacks[state.bossAtkIdx];
  const btns = document.querySelectorAll('#bossOpts button');
  btns.forEach(bn=>bn.onclick=null);
  
  const log = document.getElementById('bossLog');
  
  if(idx === atk.answer){
    btns[idx].classList.add('correct');
    state.bossHp -= 15;
    if(state.bossHp < 0) state.bossHp = 0;
    state.stars += 3;
    log.innerHTML = `⚔️ 你的攻击命中！BOSS 受到 15 点伤害！`;
    document.getElementById('dStars').textContent = '⭐ '+state.stars;
  } else {
    btns[idx].classList.add('wrong');
    btns[atk.answer].classList.add('correct');
    const dmg = 10 + Math.floor(Math.random()*10);
    state.hp -= dmg;
    if(state.hp < 1) state.hp = 1;
    log.innerHTML = `💥 BOSS 反击！你受到 ${dmg} 点伤害！`;
    document.getElementById('playerHP').textContent = '❤️ '+state.hp;
  }
  
  state.bossAtkIdx = (state.bossAtkIdx + 1) % b.attacks.length;
  
  // Check boss death
  if(state.bossHp <= 0){
    setTimeout(()=>{
      const content = document.getElementById('gameContent');
      content.innerHTML = `
        <div class="boss-area">
          <div class="boss-victory">
            <span class="big">🎉</span>
            <strong>${b.name} 被击败了！</strong>
            <p style="font-size:.9rem;color:var(--text2);margin-top:12px">你获得了 ${state.stars} 星辰之力</p>
          </div>
          <div class="story-area">
            <div class="story-passage">
              <div class="passage-text">${story.outro.replace(/\n/g,'<br>')}</div>
            </div>
            <button class="choice-btn" onclick="finishDay()" style="border-color:var(--accent);text-align:center">🌟 完成章节 →</button>
          </div>
        </div>`;
    },800);
    return;
  }
  
  // Continue boss fight
  setTimeout(()=>renderDay(), 1200);
}

function finishDay(){
  const story = STORIES[state.dayId];
  const ch = CHAPTERS.find(c=>c.id===state.dayId);
  
  // Check if it's epilogue
  if(ch.day === 8){
    document.getElementById('gameContent').innerHTML = `
      <div class="day-complete">
        <div class="big-icon">🌅</div>
        <h2>旅程的终点</h2>
        <p>你完成了所有八天的时空冒险。</p>
        <div class="stats">
          <span>❤️ ${state.hp}</span>
          <span>⭐ ${state.stars}</span>
          <span>📚 8/8</span>
        </div>
        <button class="next-btn" onclick="exitGame()">✦ 回到时空地图</button>
      </div>`;
    updateSave();
    return;
  }
  
  const nextCh = CHAPTERS.find(c=>c.day===ch.day+1);
  document.getElementById('gameContent').innerHTML = `
    <div class="day-complete">
      <div class="big-icon">${story.icon}</div>
      <h2>✦ ${ch.title} · 完成 ✦</h2>
      <div class="stats">
        <span>❤️ ${state.hp}</span>
        <span>⭐ ${state.stars}</span>
        <span>📚 第 ${ch.day} 天 ✓</span>
      </div>
      <div class="story-area">
        <div class="story-passage">
          <div class="passage-text">${story.outro.replace(/\n/g,'<br>')}</div>
        </div>
      </div>
      <button class="next-btn" onclick="goToNext()">✦ 进入第 ${ch.day+1} 天 →</button>
    </div>`;
  
  updateSave();
}

function goToNext(){
  const ch = CHAPTERS.find(c=>c.id===state.dayId);
  const nextCh = CHAPTERS.find(c=>c.day===ch.day+1);
  if(nextCh) playDay(nextCh.id);
}

function updateSave(){
  const save = loadSave();
  save.hp = state.hp;
  save.stars = state.stars;
  const ch = CHAPTERS.find(c=>c.id===state.dayId);
  if(!save.completed.includes(state.dayId)) save.completed.push(state.dayId);
  save.day = Math.max(save.day, ch?ch.day+1:save.day);
  saveSave(save);
}

/* ─── BOOT ─── */
setTimeout(()=>document.getElementById('load').classList.add('hide'), 800);
</script>
